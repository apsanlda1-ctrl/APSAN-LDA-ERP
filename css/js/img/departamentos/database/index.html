<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>APSAN ERP - Login</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="left-panel">

        <div class="overlay">

            <img src="img/logo.png" class="logo">

            <h1>APSAN ERP</h1>

            <p>Sistema Integrado de Gestão Empresarial</p>

        </div>

    </div>

    <div class="right-panel">

        <form id="loginForm" class="login-box">

            <h2>Entrar no Sistema</h2>

            <div class="input-group">

                <i class="fa fa-user"></i>

                <input
                    type="text"
                    id="username"
                    placeholder="Utilizador"
                    required>

            </div>

            <div class="input-group">

                <i class="fa fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Palavra-passe"
                    required>

                <span id="togglePassword">

                    <i class="fa fa-eye"></i>

                </span>

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Lembrar-me

                </label>

                <a href="#">Esqueci a senha</a>

            </div>

            <button type="submit">

                <i class="fa fa-right-to-bracket"></i>

                Entrar

            </button>

            <div class="test-users">

                <h3>Utilizadores de Teste</h3>

                <p><strong>Administrador</strong> → admin / 123456</p>

                <p><strong>Gestor</strong> → gestor / 123456</p>

                <p><strong>Funcionário</strong> → funcionario / 123456</p>

            </div>

        </form>

    </div>

</div>

<div id="loader">

    <div class="spinner"></div>

</div>

<script src="js/login.js"></script>

</body>

</html>
