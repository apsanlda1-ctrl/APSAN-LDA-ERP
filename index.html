<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APSAN, LDA - Acesso ao Sistema</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Inter', sans-serif; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
      position: relative;
      overflow: hidden;
    }

    /* Imagem de fundo em movimento panorâmico */
    .bg-moving-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 130%;
      height: 100%;
      background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center;
      z-index: -2;
      filter: brightness(0.55) blur(2px);
      animation: moverFundo 30s ease-in-out infinite alternate;
    }

    @keyframes moverFundo {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-20%); }
    }

    /* Camada sobreposta em gradiente azul corporativo */
    .bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(15, 32, 67, 0.85), rgba(29, 78, 216, 0.8));
      z-index: -1;
    }
    
    /* Novo estilo de cartão de login moderno (Glassmorphism Executivo) */
    .login-card { 
      background: rgba(255, 255, 255, 0.95); 
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
      width: 100%; 
      max-width: 440px; 
      overflow: hidden; 
      position: relative;
      z-index: 1;
    }
    
    .logo-section { 
      background: linear-gradient(135deg, #1e3a5f, #2563eb); 
      color: #ffffff; 
      padding: 30px 20px; 
      text-align: center; 
      border-bottom: 4px solid #3b82f6;
    }
    
    /* Bolinha ajustada com centralização exata e perfeita */
    .logo-icon { 
      width: 110px; 
      height: 110px; 
      background: #ffffff; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      margin: 0 auto 12px; 
      padding: 0; 
      overflow: hidden; 
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }
    
    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Mantém proporções sem cortar */
      transform: scale(1.15); /* Zoom equilibrado para ocupar o espaço sem rebentar as bordas */
      display: block;
      margin: auto;
    }

    .logo-section h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.5px; }
    .logo-section p { font-size: 13px; opacity: 0.9; font-weight: 300; }
    
    /* Novo design para o formulário interno */
    .login-form { padding: 25px 30px 30px; }
    .login-form h2 { font-size: 18px; margin-bottom: 18px; color: #1e293b; text-align: center; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 12px; color: #475569; text-transform: uppercase; }
    
    .department-select { 
      width: 100%; 
      padding: 12px; 
      border: 2px solid #cbd5e1; 
      border-radius: 10px; 
      font-size: 14px; 
      background: #f8fafc; 
      color: #1e293b; 
      cursor: pointer; 
      outline: none; 
      transition: all 0.3s;
    }
    .department-select:focus { border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
    
    .input-group { position: relative; margin-bottom: 16px; }
    .input-group i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 15px; }
    
    .input-group input { 
      width: 100%; 
      padding: 12px 14px 12px 42px; 
      border: 2px solid #cbd5e1; 
      border-radius: 10px; 
      font-size: 14px; 
      outline: none; 
      background: #f8fafc;
      transition: all 0.3s;
    }
    .input-group input:focus { border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
    
    .btn-login { 
      width: 100%; 
      padding: 13px; 
      background: linear-gradient(135deg, #1e3a5f, #2563eb); 
      color: #ffffff; 
      border: none; 
      border-radius: 10px; 
      font-size: 15px; 
      font-weight: 600; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 8px; 
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
      margin-top: 5px;
    }
    .btn-login:hover { background: linear-gradient(135deg, #172e4d, #1d4ed8); transform: translateY(-1px); }
    
    .login-footer { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px solid #e2e8f0; font-size: 13px; color: #64748b; }
    .login-footer a { color: #2563eb; text-decoration: none; font-weight: 500; }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- Imagem em movimento panorâmico ao fundo -->
<div class="bg-moving-image"></div>

<!-- Camada azul sobreposta -->
<div class="bg-overlay"></div>

<div class="login-card">
  <div class="logo-section">
    <div class="logo-icon">
      <img src="logo_apsan.png" alt="Logótipo APSAN, LDA">
    </div>
    <h1>APSAN, LDA</h1>
    <p>Sistema de Gestão Integrado (Angola - Namíbia)</p>
  </div>
  
  <form class="login-form" onsubmit="redirecionarDepartamento(event)">
    <h2>Acesso ao Sistema</h2>
    
    <div class="form-group">
      <label for="department-select">Selecione o Departamento:</label>
      <select id="department-select" class="department-select" required>
        <option value="traducao">📜 Tradução Oficial Juramentada</option>
        <option value="hospitalar">🏥 Acompanhamento Hospitalar</option>
        <option value="administrativo">📋 Administrativo</option>
        <option value="financeiro" selected>💰 Financeiro</option>
        <option value="operacoes">⚙️ Operações e Logística</option>
      </select>
    </div>

    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" id="username" value="admin.apsan" placeholder="Nome de Utilizador" required>
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" value="123456" placeholder="Palavra-passe" required>
    </div>

    <button type="submit" class="btn-login">
      <i class="fas fa-sign-in-alt"></i> Entrar no Sistema
    </button>

    <div class="login-footer">
      <a href="#">Recuperar palavra-passe</a>
      <span>v3.5.0</span>
    </div>
  </form>
</div>

<script>
  function redirecionarDepartamento(event) {
    event.preventDefault();
    const departamento = document.getElementById('department-select').value;
    
    if (departamento === 'traducao') {
      window.location.href = 'traducao.html';
    } else if (departamento === 'hospitalar') {
      window.location.href = 'acompanhamento_hospitalar.html';
    } else if (departamento === 'financeiro') {
      window.location.href = 'financeiro.html';
    } else if (departamento === 'administrativo') {
      window.location.href = 'administrativo.html';
    } else if (departamento === 'operacoes') {
      window.location.href = 'operacoes.html';
    } else {
      alert('A redirecionar para o departamento de ' + departamento);
    }
  }
</script>

</body>
</html>
