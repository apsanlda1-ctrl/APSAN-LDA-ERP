<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APSAN, LDA - Acesso ao Sistema</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Inter', sans-serif; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
      position: relative;
      overflow: hidden;
      background-color: #1e3a5f;
    }

    .bg-moving-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
    }

    .bg-moving-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 140%;
      height: 100%;
      background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center;
      filter: brightness(0.85);
      animation: deslizarEscritorio 25s ease-in-out infinite alternate;
    }

    @keyframes deslizarEscritorio {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-25%); }
    }
    
    .login-card { 
      background: #ffffff; 
      border-radius: 16px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
      width: 100%; 
      max-width: 680px; 
      display: flex;
      overflow: hidden; 
      position: relative;
      z-index: 10;
    }
    
    .logo-section { 
      background: linear-gradient(135deg, #1e3a5f, #2563eb); 
      color: #ffffff; 
      padding: 30px 20px; 
      text-align: center; 
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .logo-icon { 
      width: 85px; 
      height: 85px; 
      background: #ffffff; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      margin-bottom: 12px; 
      padding: 0; 
      overflow: hidden; 
      box-shadow: 0 5px 12px rgba(0,0,0,0.3);
    }
    
    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: scale(1.15);
      display: block;
      margin: auto;
    }

    .logo-section h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.5px; }
    .logo-section p { font-size: 12px; opacity: 0.9; font-weight: 300; line-height: 1.3; }
    
    .login-form { 
      padding: 25px 25px; 
      flex: 1.2;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-form h2 { font-size: 15px; margin-bottom: 14px; color: #1e293b; text-align: center; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
    
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .department-select { 
      width: 100%; 
      padding: 9px 12px; 
      border: 2px solid #e2e8f0; 
      border-radius: 8px; 
      font-size: 12px; 
      background: #f8fafc; 
      color: #1e293b; 
      cursor: pointer; 
      outline: none; 
      transition: all 0.3s ease;
    }
    .department-select:focus { border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    
    .input-group { position: relative; margin-bottom: 12px; }
    .input-group i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 14px; }
    
    .input-group input { 
      width: 100%; 
      padding: 9px 12px 9px 38px; 
      border: 2px solid #e2e8f0; 
      border-radius: 8px; 
      font-size: 12px; 
      outline: none; 
      background: #f8fafc;
      transition: all 0.3s ease;
    }
    .input-group input:focus { border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    
    .btn-login { 
      width: 100%; 
      padding: 10px; 
      background: #2563eb; 
      color: #ffffff; 
      border: none; 
      border-radius: 8px; 
      font-size: 13px; 
      font-weight: 600; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 6px; 
      transition: all 0.3s ease;
      box-shadow: 0 3px 10px rgba(37,99,235,0.3);
      margin-top: 4px;
    }
    .btn-login:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 5px 12px rgba(37,99,235,0.4); }
    
    .login-footer { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 1px solid #e2e8f0; font-size: 11px; color: #64748b; }
    .login-footer a { color: #2563eb; text-decoration: none; font-weight: 500; }
    .login-footer a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .login-card { flex-direction: column; max-width: 380px; }
      .logo-section { padding: 20px 15px; }
      .login-form { padding: 20px 15px; }
    }
  </style>
</head>
<body>

<div class="bg-moving-container">
  <div class="bg-moving-image"></div>
</div>

<div class="login-card">
  <div class="logo-section">
    <div class="logo-icon">
      <img src="logo_apsan.png" alt="Logótipo APSAN, LDA">
    </div>
    <h1>APSAN, LDA</h1>
    <p>NIF: 5002085011<br>(Angola - Namíbia)</p>
  </div>
  
  <form class="login-form" onsubmit="redirecionarDepartamento(event)">
    <h2>Acesso ao Sistema</h2>
    <div class="form-group">
      <label for="department-select">Selecione o Departamento:</label>
      <select id="department-select" class="department-select" required>
        <option value="" disabled selected>Selecione o seu Departamento</option>
        <option value="rh">👥 Recursos Humanos</option>
        <option value="contabilidade">📊 Contabilidade</option>
        <option value="financeiro">💰 Financeiro</option>
        <option value="administrativo">🏛️ Administração Geral</option>
        <option value="operacoes">⚙️ Operações e Logística</option>
        <option value="traducao">📜 Tradução Oficial Juramentada</option>
        <option value="hospitalar">🏥 Acompanhamento Hospitalar</option>
      </select>
    </div>

    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" id="username" value="admin.apsan" placeholder="Nome de Utilizador" required>
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" value="123456" placeholder="Palavra-passe" required>
    </div>

    <button type="submit" class="btn-login">
      <i class="fas fa-sign-in-alt"></i> Entrar no Sistema
    </button>

    <div class="login-footer">
      <a href="#">Recuperar palavra-passe</a>
      <span>v3.5.0</span>
    </div>
  </form>
</div>

<script>
  function redirecionarDepartamento(event) {
    event.preventDefault();
    
    localStorage.removeItem('usuarioLogado');
    sessionStorage.clear();

    const departamento = document.getElementById('department-select').value;
    
    if (departamento === 'rh') {
      window.location.href = 'rh.html';
    } else if (departamento === 'contabilidade') {
      window.location.href = 'contabilidade.html';
    } else if (departamento === 'financeiro') {
      window.location.href = 'financeiro.html';
    } else if (departamento === 'administrativo') {
      window.location.href = 'administracao.html';
    } else if (departamento === 'operacoes') {
      window.location.href = 'operacoes.html';
    } else if (departamento === 'traducao') {
      window.location.href = 'traducao.html';
    } else if (departamento === 'hospitalar') {
      window.location.href = 'acompanhamento_hospitalar.html';
    } else {
      alert('Por favor, selecione um departamento válido.');
    }
  }
</script>

</body>
</html>
