<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APSAN, LDA - Departamento de Tradução Oficial Juramentada</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2b6cb0;
            --accent-color: #319795;
            --bg-color: #f7fafc;
            --text-color: #2d3748;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
        }
        .module {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: #fff;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
            margin-top: 5px;
        }
        button:hover {
            background-color: var(--primary-color);
        }
        .btn-whatsapp {
            background-color: #25d366;
        }
        .btn-whatsapp:hover {
            background-color: #128c7e;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #e2e8f0;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: var(--primary-color);
            color: white;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
            color: white;
        }
        .status-pendente { background-color: #d69e2e; }
        .status-traducao { background-color: #3182ce; }
        .status-notario { background-color: #805ad5; }
        .status-concluido { background-color: #38a169; }
    </style>
</head>
<body>

<div class="container">
    <h1>APSAN, LDA — Tradução Oficial Juramentada</h1>
    <p>Sistema Integrado de Gestão Administrativa, Orçamentos e Operações.</p>

    <!-- MÓDULO 1: GESTÃO DE CLIENTES & AUTOCOMPLETE -->
    <div class="module">
        <h2>1. Gestão de Clientes</h2>
        <div class="form-group">
            <label for="cliente-nome">Nome Completo / Empresa:</label>
            <input type="text" id="cliente-nome" placeholder="Digite o nome do cliente..." oninput="sugerirClientes(this.value)">
            <div id="sugestoes-clientes" style="background:#fff; border:1px solid #ccc; position:absolute; z-index:10; display:none;"></div>
        </div>
        <div class="form-group">
            <label for="cliente-contacto">Contacto Telefónico / WhatsApp:</label>
            <input type="text" id="cliente-contacto" placeholder="+244 ...">
        </div>
        <button onclick="registarCliente()">Salvar Cliente</button>
    </div>

    <!-- MÓDULO 2: SIMULADOR DE ORÇAMENTOS E ENVIO RÁPIDO WHATSAPP -->
    <div class="module">
        <h2>2. Calculadora e Orçamentos</h2>
        <div class="form-group">
            <label for="servico-tipo">Tipo de Documento:</label>
            <select id="servico-tipo">
                <option value="Certidão / Documento Pessoal">Certidão / Documento Pessoal</option>
                <option value="Documentação Comercial / Jurídica">Documentação Comercial / Jurídica</option>
                <option value="Autorização de Viagem / Outros">Autorização de Viagem / Outros</option>
            </select>
        </div>
        <div class="form-group">
            <label for="qtd-paginas">Quantidade de Páginas:</label>
            <input type="number" id="qtd-paginas" value="1" min="1" oninput="calcularTotal()">
        </div>
        <div class="form-group">
            <label>Valor Total Estimado (AOA):</label>
            <h3 id="valor-total-exibido">0,00 AOA</h3>
        </div>
        <button onclick="guardarOrcamentoSimulado()">Salvar Orçamento</button>
        <button class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar Orçamento via WhatsApp</button>
    </div>

    <!-- MÓDULO 3: PIPELINE DE PEDIDOS E STATUS -->
    <div class="module">
        <h2>3. Pipeline de Pedidos e Rastreamento</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo de Serviço</th>
                    <th>Páginas</th>
                    <th>Total</th>
                    <th>Estado Atual</th>
                    <th>Ações</th>
                </tr>
            <t/head>
            <tbody id="tabela-pipeline">
                <!-- Preenchido dinamicamente via JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // Bases de dados locais via LocalStorage
    let dbClientes = JSON.parse(localStorage.getItem('apsan_clientes')) || [];
    let dbOrcamentos = JSON.parse(localStorage.getItem('apsan_orcamentos')) || [];

    function registarCliente() {
        const nome = document.getElementById('cliente-nome').value;
        const contacto = document.getElementById('cliente-contacto').value;
        if(!nome) {
            alert('Por favor, insira o nome do cliente.');
            return;
        }
        dbClientes.push({ id: Date.now(), nome, contacto });
        localStorage.setItem('apsan_clientes', JSON.stringify(dbClientes));
        alert('Cliente registado com sucesso!');
        document.getElementById('cliente-nome').value = '';
        document.getElementById('cliente-contacto').value = '';
    }

    function calcularTotal() {
        const paginas = document.getElementById('qtd-paginas').value;
        const precoPorPagina = 15000; // Exemplo de preço base em AOA
        const total = paginas * precoPorPagina;
        document.getElementById('valor-total-exibido').innerText = total.toLocaleString('pt-AO') + ' AOA';
        return total;
    }

    function guardarOrcamentoSimulado() {
        const tipo = document.getElementById('servico-tipo').value;
        const paginas = document.getElementById('qtd-paginas').value;
        const total = calcularTotal();
        
        const novoPedido = {
            id: Date.now().toString().slice(-4),
            tipo,
            paginas,
            total: total.toLocaleString('pt-AO') + ' AOA',
            status: 'Pendente'
        };

        dbOrcamentos.push(novoPedido);
        localStorage.setItem('apsan_orcamentos', JSON.stringify(dbOrcamentos));
        carregarPipeline();
        alert('Orçamento guardado no pipeline com sucesso!');
    }

    function enviarWhatsApp() {
        const contacto = document.getElementById('cliente-contacto').value;
        const tipo = document.getElementById('servico-tipo').value;
        const paginas = document.getElementById('qtd-paginas').value;
        const total = document.getElementById('valor-total-exibido').innerText;

        const mensagem = `Olá! Segue o orçamento da APSAN, LDA para o serviço de ${tipo} (${paginas} página(s)). Valor total: ${total}. Confirmamos o andamento?`;
        const link = `https://api.whatsapp.com/send?phone=${encodeURIComponent(contacto)}&text=${encodeURIComponent(mensagem)}`;
        window.open(link, '_blank');
    }

    function alterarStatus(id) {
        const estados = ['Pendente', 'Em Tradução', 'Em Notário', 'Concluído'];
        const pedido = dbOrcamentos.find(p => p.id === id);
        if(pedido) {
            let currentIndex = estados.indexOf(pedido.status);
            let nextIndex = (currentIndex + 1) % estados.length;
            pedido.status = estados[nextIndex];
            localStorage.setItem('apsan_orcamentos', JSON.stringify(dbOrcamentos));
            carregarPipeline();
        }
    }

    function carregarPipeline() {
        const tbody = document.getElementById('tabela-pipeline');
        tbody.innerHTML = '';
        
        if(dbOrcamentos.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">Nenhum registo encontrado.</td></tr>`;
            return;
        }

        dbOrcamentos.forEach(p => {
            let classeStatus = 'status-pendente';
            if(p.status === 'Em Tradução') classeStatus = 'status-traducao';
            if(p.status === 'Em Notário') classeStatus = 'status-notario';
            if(p.status === 'Concluído') classeStatus = 'status-concluido';

            tbody.innerHTML += `
                <tr>
                    <td>#${p.id}</td>
                    <td>${p.tipo}</td>
                    <td>${p.paginas}</td>
                    <td>${p.total}</td>
                    <td><span class="status-badge ${classeStatus}">${p.status}</span></td>
                    <td><button onclick="alterarStatus('${p.id}')">Avançar Estado</button></td>
                </tr>
            `;
        });
    }

    // Inicializar carregamento ao abrir a página
    window.onload = function() {
        calcularTotal();
        carregarPipeline();
    };
</script>

</body>
</html>
